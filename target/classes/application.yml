spring:
  application:
    name: quarkbau-monolith
  datasource:
    url: jdbc:postgresql://localhost:5432/quarkbau_monolith
    username: quarkbau
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
  jackson:
    serialization:
      fail-on-empty-beans: false

server:
  port: 8080

